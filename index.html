    <meta property="og:title" content="박세미 배우님 스케줄">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="박세미 배우님 스케줄">
    <meta name="twitter:description" content="배우 박세미의 공연 일정과 스케줄을 확인하고 티켓을 예매하세요.">

    <!-- 기본 링크 설정 -->
    <link rel="canonical" href="https://semsamo.github.io/">

    <!-- 구조화된 데이터 (Google 리치 결과) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "박세미 배우님 스케줄",

      "inLanguage": "ko-KR"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "박세미",
      "jobTitle": "배우",
      "sameAs": [
        "https://www.instagram.com/1_0_0_8_/"
      ]
    }
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/main.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <!-- 다크모드 깜빡임 방지 (페이지 로드 전 테마 적용) -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else if (prefersDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>
<!-- 다크모드 토글 버튼 -->
<button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">
    <span class="icon-sun">☀️</span>
    <span class="icon-moon">🌙</span>
</button>

<div class="container">
    <header class="header">
        <h1 class="title">박세미 배우님 스케줄</h1>
        <p>공연 일정 및 예매 안내</p>
    </header>

    <div class="schedule-wrap">
        <div class="calendar-container">
            <div class="custom-header">
                <div class="month-title" id="monthTitle"></div>
                <div class="nav-buttons">
                    <button class="nav-btn prev" id="prevBtn">‹</button>
                    <button class="nav-btn today-btn" id="todayBtn">오늘</button>
                    <button class="nav-btn next" id="nextBtn">›</button>
                </div>
            </div>
            <div id="calendar"></div>
            <div class="schedule-notice">상기 스케줄은 배우 및 제작사의 사정으로 사전 공지 없이 변경될 수 있습니다.</div>
        </div>

        <div class="artist-section">
            <a href="https://www.instagram.com/1_0_0_8_/" target="_blank" class="artist-image">
                <img src="/img/sem20260214.PNG" alt="배우 박세미">
            </a>

            <div class="booking-section">
                <div class="booking-table">
                    <div class="booking-header">
                        <h3>티켓 예매</h3>
                    </div>
                
                    
                    <div class="booking-row">
                        <div class="show-title">정희</div>
                        <div class="booking-links">
                            <a href="https://tickets.interpark.com/contents/notice/detail/12824" target="_blank" class="booking-btn interpark">NOL</a>
                            <a href="https://ticket.yes24.com/New/Notice/NoticeMain.aspx#id=17349" target="_blank" class="booking-btn yes24">YES24</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>© 박세미 배우님 스케줄 </p>
    </footer>
</div>

<!-- 이벤트 상세 모달 -->
<div id="eventModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="modalDate"></div>
            <button class="close-btn" onclick="closeModal()"></button>
        </div>
        <div class="modal-body">
            <ul class="event-list" id="eventList"></ul>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.js"></script>
<script src="script.js"></script>
</body>
</html>
